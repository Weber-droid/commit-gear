paths:
  /products:
    get:
      tags: [Products]
      operationId: listProducts
      summary: List products with filters and pagination
      description: |
        Cached catalog endpoint. Supports category, price range, and full-text search.
        Cache TTL: 300 seconds. Invalidated on any product write.
      x-roles: [public]
      security: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/PageParam'
        - $ref: '../openapi.yaml#/components/parameters/LimitParam'
        - name: category
          in: query
          schema:
            $ref: '../openapi.yaml#/components/schemas/ProductCategory'
        - name: minPrice
          in: query
          schema:
            type: integer
            minimum: 0
        - name: maxPrice
          in: query
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          description: Full-text search on title and description
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ProductListResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      - id: '507f1f77bcf86cd799439011'
                        title: 'Commit Gear Hoodie — Graphite'
                        description: Premium heavyweight hoodie with embroidered logo
                        price: 4500000
                        category: hoodies
                        images:
                          - https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                        inventory: 42
                        vendorId: '507f1f77bcf86cd799439012'
                        isActive: true
                        createdAt: '2026-03-01T12:00:00.000Z'
                        updatedAt: '2026-03-01T12:00:00.000Z'
                    meta:
                      page: 1
                      limit: 20
                      total: 1
                      totalPages: 1
        '400':
          $ref: '../openapi.yaml#/components/responses/BadRequest'
        '429':
          $ref: '../openapi.yaml#/components/responses/TooManyRequests'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

    post:
      tags: [Products]
      operationId: createProduct
      summary: Create a new product
      description: Vendor or admin only. Triggers catalog cache eviction.
      x-roles: [vendor, admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateProductRequest'
            example:
              title: 'Mechanical Keycap Set — Terminal'
              description: Cherry MX compatible PBT keycaps with Commit Gear legends
              price: 2800000
              category: keycaps
              images:
                - https://res.cloudinary.com/commitgear/image/upload/v1/keycap-terminal.webp
              inventory: 100
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ProductResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439013'
                      title: 'Mechanical Keycap Set — Terminal'
                      description: Cherry MX compatible PBT keycaps with Commit Gear legends
                      price: 2800000
                      category: keycaps
                      images:
                        - https://res.cloudinary.com/commitgear/image/upload/v1/keycap-terminal.webp
                      inventory: 100
                      vendorId: '507f1f77bcf86cd799439012'
                      isActive: true
                      createdAt: '2026-06-15T09:00:00.000Z'
                      updatedAt: '2026-06-15T09:00:00.000Z'
        '400':
          $ref: '../openapi.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /products/{id}:
    get:
      tags: [Products]
      operationId: getProductById
      summary: Get product by ID
      description: Cached per product. TTL 600 seconds.
      x-roles: [public]
      security: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ObjectIdParam'
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ProductResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439011'
                      title: 'Commit Gear Hoodie — Graphite'
                      description: Premium heavyweight hoodie with embroidered logo
                      price: 4500000
                      category: hoodies
                      images:
                        - https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                      inventory: 42
                      vendorId: '507f1f77bcf86cd799439012'
                      isActive: true
                      createdAt: '2026-03-01T12:00:00.000Z'
                      updatedAt: '2026-03-01T12:00:00.000Z'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

    patch:
      tags: [Products]
      operationId: updateProduct
      summary: Update a product
      description: Vendor may update own products; admin may update any. Triggers cache eviction.
      x-roles: [vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ObjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UpdateProductRequest'
            example:
              price: 4200000
              inventory: 38
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ProductResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439011'
                      title: 'Commit Gear Hoodie — Graphite'
                      description: Premium heavyweight hoodie with embroidered logo
                      price: 4200000
                      category: hoodies
                      images:
                        - https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                      inventory: 38
                      vendorId: '507f1f77bcf86cd799439012'
                      isActive: true
                      createdAt: '2026-03-01T12:00:00.000Z'
                      updatedAt: '2026-06-20T14:00:00.000Z'
        '400':
          $ref: '../openapi.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

    delete:
      tags: [Products]
      operationId: deleteProduct
      summary: Soft-delete a product
      description: "Sets isActive to false. Triggers catalog cache eviction."
      x-roles: [vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ObjectIdParam'
      responses:
        '200':
          description: Product deactivated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../openapi.yaml#/components/schemas/SuccessEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            $ref: '../openapi.yaml#/components/schemas/ObjectId'
                          isActive:
                            type: boolean
                            example: false
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439011'
                      isActive: false
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'
