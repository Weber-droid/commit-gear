paths:
  /orders/checkout:
    post:
      tags: [Orders]
      operationId: checkout
      summary: Create order from cart with atomic inventory decrement
      description: |
        Converts the authenticated user's cart into an order. Uses MongoDB atomic
        `$inc` with inventory guard conditions to prevent race conditions.
        Cart is cleared on success. Order is created with `paymentStatus: pending`.
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CheckoutRequest'
            example:
              shippingAddress:
                fullName: Ada Lovelace
                line1: 42 Binary Street
                city: Lagos
                state: Lagos
                country: NG
                postalCode: '100001'
      responses:
        '201':
          description: Order created, inventory decremented
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/CheckoutResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      order:
                        id: '507f1f77bcf86cd799439040'
                        userId: '507f1f77bcf86cd799439011'
                        items:
                          - productId: '507f1f77bcf86cd799439011'
                            title: 'Commit Gear Hoodie — Graphite'
                            priceAtPurchase: 4500000
                            quantity: 1
                            imageSnapshot: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                        totalAmount: 4500000
                        paymentStatus: pending
                        paymentProvider: paystack
                        paymentReference: null
                        status: pending
                        shippingAddress:
                          fullName: Ada Lovelace
                          line1: 42 Binary Street
                          city: Lagos
                          state: Lagos
                          country: NG
                          postalCode: '100001'
                        createdAt: '2026-06-21T13:00:00.000Z'
                        updatedAt: '2026-06-21T13:00:00.000Z'
        '400':
          description: Empty cart or validation error
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Cart is empty
                error:
                  code: CART_EMPTY
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '409':
          description: Inventory conflict during atomic decrement
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Insufficient inventory for one or more items
                error:
                  code: INVENTORY_CONFLICT
                  details:
                    conflicts:
                      - productId: '507f1f77bcf86cd799439011'
                        requested: 2
                        available: 1
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /orders:
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List authenticated user's orders
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/PageParam'
        - $ref: '../openapi.yaml#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            $ref: '../openapi.yaml#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Paginated order history
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/OrderListResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      - id: '507f1f77bcf86cd799439040'
                        userId: '507f1f77bcf86cd799439011'
                        items:
                          - productId: '507f1f77bcf86cd799439011'
                            title: 'Commit Gear Hoodie — Graphite'
                            priceAtPurchase: 4500000
                            quantity: 1
                            imageSnapshot: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                        totalAmount: 4500000
                        paymentStatus: paid
                        paymentProvider: paystack
                        paymentReference: T1234567890
                        status: processing
                        createdAt: '2026-06-21T13:00:00.000Z'
                        updatedAt: '2026-06-21T13:05:00.000Z'
                    meta:
                      page: 1
                      limit: 20
                      total: 1
                      totalPages: 1
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /orders/{id}:
    get:
      tags: [Orders]
      operationId: getOrderById
      summary: Get order by ID
      description: Users may only access their own orders unless admin.
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ObjectIdParam'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/OrderResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439040'
                      userId: '507f1f77bcf86cd799439011'
                      items:
                        - productId: '507f1f77bcf86cd799439011'
                          title: 'Commit Gear Hoodie — Graphite'
                          priceAtPurchase: 4500000
                          quantity: 1
                          imageSnapshot: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                      totalAmount: 4500000
                      paymentStatus: paid
                      paymentProvider: paystack
                      paymentReference: T1234567890
                      status: processing
                      createdAt: '2026-06-21T13:00:00.000Z'
                      updatedAt: '2026-06-21T13:05:00.000Z'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /orders/{id}/status:
    patch:
      tags: [Orders]
      operationId: updateOrderStatus
      summary: Update order fulfillment status
      description: Admin only. Used for shipping workflow and webhook reconciliation.
      x-roles: [admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ObjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UpdateOrderStatusRequest'
            example:
              status: shipped
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/OrderResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439040'
                      userId: '507f1f77bcf86cd799439011'
                      items:
                        - productId: '507f1f77bcf86cd799439011'
                          title: 'Commit Gear Hoodie — Graphite'
                          priceAtPurchase: 4500000
                          quantity: 1
                          imageSnapshot: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                      totalAmount: 4500000
                      paymentStatus: paid
                      paymentProvider: paystack
                      paymentReference: T1234567890
                      status: shipped
                      createdAt: '2026-06-21T13:00:00.000Z'
                      updatedAt: '2026-06-22T09:00:00.000Z'
        '400':
          $ref: '../openapi.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'
