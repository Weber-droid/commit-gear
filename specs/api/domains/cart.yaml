paths:
  /cart:
    get:
      tags: [Cart]
      operationId: getCart
      summary: Get current user's cart
      description: Server-persisted cart with live price and inventory snapshots.
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current cart
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/CartResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439030'
                      userId: '507f1f77bcf86cd799439011'
                      items:
                        - productId: '507f1f77bcf86cd799439011'
                          title: 'Commit Gear Hoodie — Graphite'
                          price: 4500000
                          quantity: 1
                          image: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                          inventoryAvailable: 42
                      subtotal: 4500000
                      itemCount: 1
                      updatedAt: '2026-06-21T12:00:00.000Z'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

    delete:
      tags: [Cart]
      operationId: clearCart
      summary: Remove all items from cart
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/CartResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439030'
                      userId: '507f1f77bcf86cd799439011'
                      items: []
                      subtotal: 0
                      itemCount: 0
                      updatedAt: '2026-06-21T12:30:00.000Z'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /cart/items:
    post:
      tags: [Cart]
      operationId: addCartItem
      summary: Add item to cart or increment quantity
      description: |
        If product already in cart, quantities are merged (capped at inventory and max 99).
        Frontend should use optimistic UI updates per ui/data-fetching.md.
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AddCartItemRequest'
            example:
              productId: '507f1f77bcf86cd799439011'
              quantity: 1
      responses:
        '200':
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/CartResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439030'
                      userId: '507f1f77bcf86cd799439011'
                      items:
                        - productId: '507f1f77bcf86cd799439011'
                          title: 'Commit Gear Hoodie — Graphite'
                          price: 4500000
                          quantity: 2
                          image: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                          inventoryAvailable: 42
                      subtotal: 9000000
                      itemCount: 2
                      updatedAt: '2026-06-21T12:15:00.000Z'
        '400':
          $ref: '../openapi.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '404':
          description: Product not found or inactive
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Product not found
                error:
                  code: PRODUCT_NOT_FOUND
        '409':
          description: Insufficient inventory
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Insufficient inventory
                error:
                  code: INVENTORY_CONFLICT
                  details:
                    productId: '507f1f77bcf86cd799439011'
                    requested: 5
                    available: 2
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /cart/items/{productId}:
    patch:
      tags: [Cart]
      operationId: updateCartItem
      summary: Update item quantity in cart
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UpdateCartItemRequest'
            example:
              quantity: 3
      responses:
        '200':
          description: Cart item updated
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/CartResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439030'
                      userId: '507f1f77bcf86cd799439011'
                      items:
                        - productId: '507f1f77bcf86cd799439011'
                          title: 'Commit Gear Hoodie — Graphite'
                          price: 4500000
                          quantity: 3
                          image: https://res.cloudinary.com/commitgear/image/upload/v1/hoodie-graphite.webp
                          inventoryAvailable: 42
                      subtotal: 13500000
                      itemCount: 3
                      updatedAt: '2026-06-21T12:20:00.000Z'
        '400':
          $ref: '../openapi.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '404':
          description: Cart item or product not found
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Item not in cart
                error:
                  code: CART_ITEM_NOT_FOUND
        '409':
          $ref: '../openapi.yaml#/components/responses/Conflict'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

    delete:
      tags: [Cart]
      operationId: removeCartItem
      summary: Remove item from cart
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ProductIdParam'
      responses:
        '200':
          description: Item removed from cart
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/CartResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      id: '507f1f77bcf86cd799439030'
                      userId: '507f1f77bcf86cd799439011'
                      items: []
                      subtotal: 0
                      itemCount: 0
                      updatedAt: '2026-06-21T12:25:00.000Z'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '404':
          description: Cart item not found
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Item not in cart
                error:
                  code: CART_ITEM_NOT_FOUND
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'
