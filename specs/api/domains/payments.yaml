paths:
  /payments/initialize:
    post:
      tags: [Payments]
      operationId: initializePayment
      summary: Initialize Paystack checkout for an order
      description: |
        Creates a Paystack transaction for a pending order. Returns `authorizationUrl`
        for client redirect. Idempotent: re-initializing a pending order with the same
        reference returns the existing session if still valid.
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/PaymentInitializeRequest'
            example:
              orderId: '507f1f77bcf86cd799439040'
              callbackUrl: https://commitgear.com/checkout/callback
      responses:
        '200':
          description: Paystack session created
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/PaymentInitializeResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      authorizationUrl: https://checkout.paystack.com/abc123xyz
                      reference: T1234567890
                      accessCode: abc123xyz
                      provider: paystack
        '400':
          description: Order not payable (already paid, cancelled, etc.)
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Order is not in a payable state
                error:
                  code: ORDER_NOT_PAYABLE
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          description: Order belongs to another user
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Order access denied
                error:
                  code: FORBIDDEN
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /payments/webhook/paystack:
    post:
      tags: [Payments]
      operationId: paystackWebhook
      summary: Paystack webhook receiver
      description: |
        Receives Paystack event notifications. Verifies `x-paystack-signature` HMAC
        using the webhook secret. Processing is idempotent: duplicate `charge.success`
        events for the same reference are acknowledged without side effects.

        **Supported events:**
        - `charge.success` → set order `paymentStatus: paid`, `status: processing`
        - `charge.failed` → set order `paymentStatus: failed`
      x-roles: [public]
      security: []
      parameters:
        - name: x-paystack-signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC SHA512 signature of raw request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event, data]
              properties:
                event:
                  type: string
                  enum: [charge.success, charge.failed]
                data:
                  type: object
                  required: [reference, status, amount]
                  properties:
                    reference:
                      type: string
                    status:
                      type: string
                    amount:
                      type: integer
                    metadata:
                      type: object
                      properties:
                        orderId:
                          $ref: '../openapi.yaml#/components/schemas/ObjectId'
            example:
              event: charge.success
              data:
                reference: T1234567890
                status: success
                amount: 4500000
                metadata:
                  orderId: '507f1f77bcf86cd799439040'
      responses:
        '200':
          description: Webhook processed (always return 200 for valid signatures to prevent retries storm)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../openapi.yaml#/components/schemas/SuccessEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: object
                        properties:
                          received:
                            type: boolean
                            example: true
                          processed:
                            type: boolean
                            example: true
              examples:
                success:
                  value:
                    success: true
                    data:
                      received: true
                      processed: true
        '400':
          description: Invalid payload structure
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Invalid webhook payload
                error:
                  code: INVALID_PAYLOAD
        '401':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Invalid webhook signature
                error:
                  code: INVALID_SIGNATURE
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'

  /payments/verify/{reference}:
    get:
      tags: [Payments]
      operationId: verifyPayment
      summary: Verify Paystack transaction after client redirect
      description: |
        Client-side callback helper. Verifies transaction with Paystack API and
        returns current payment status. Does not mutate state if webhook already processed.
      x-roles: [buyer, vendor, admin]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/ReferenceParam'
      responses:
        '200':
          description: Payment verification result
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/PaymentVerifyResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      reference: T1234567890
                      paymentStatus: paid
                      orderId: '507f1f77bcf86cd799439040'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '404':
          description: Reference not found
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorEnvelope'
              example:
                success: false
                message: Payment reference not found
                error:
                  code: NOT_FOUND
        '500':
          $ref: '../openapi.yaml#/components/responses/InternalError'
