openapi: 3.0.3
info:
  title: Commit Gear API
  version: 1.0.0
  description: |
    Premium developer merchandise marketplace API.

    All responses use a standard envelope. Authenticated routes require a Bearer access token.
    Refresh tokens are issued via HttpOnly cookies and are not included in JSON bodies.
  contact:
    name: Commit Gear Engineering
  license:
    name: Proprietary
    url: https://commitgear.com/license

servers:
  - url: http://localhost:5000/api/v1
    description: Local development
  - url: https://api.commitgear.com/api/v1
    description: Production

tags:
  - name: Auth
    description: Registration, login, token refresh, session management
  - name: Products
    description: Product catalog and vendor product management
  - name: Categories
    description: Product category taxonomy
  - name: Cart
    description: Server-persisted shopping cart
  - name: Orders
    description: Checkout and order history
  - name: Payments
    description: Paystack payment initialization and webhooks
  - name: Uploads
    description: Image upload to Cloudinary
  - name: Admin
    description: Administrative operations

paths:
  /auth/register:
    $ref: './domains/auth.yaml#/paths/~1auth~1register'
  /auth/login:
    $ref: './domains/auth.yaml#/paths/~1auth~1login'
  /auth/refresh:
    $ref: './domains/auth.yaml#/paths/~1auth~1refresh'
  /auth/logout:
    $ref: './domains/auth.yaml#/paths/~1auth~1logout'
  /auth/me:
    $ref: './domains/auth.yaml#/paths/~1auth~1me'

  /products:
    $ref: './domains/products.yaml#/paths/~1products'
  /products/{id}:
    $ref: './domains/products.yaml#/paths/~1products~1{id}'

  /categories:
    $ref: './domains/categories.yaml#/paths/~1categories'
  /categories/{id}:
    $ref: './domains/categories.yaml#/paths/~1categories~1{id}'

  /cart:
    $ref: './domains/cart.yaml#/paths/~1cart'
  /cart/items:
    $ref: './domains/cart.yaml#/paths/~1cart~1items'
  /cart/items/{productId}:
    $ref: './domains/cart.yaml#/paths/~1cart~1items~1{productId}'

  /orders/checkout:
    $ref: './domains/orders.yaml#/paths/~1orders~1checkout'
  /orders:
    $ref: './domains/orders.yaml#/paths/~1orders'
  /orders/{id}:
    $ref: './domains/orders.yaml#/paths/~1orders~1{id}'
  /orders/{id}/status:
    $ref: './domains/orders.yaml#/paths/~1orders~1{id}~1status'

  /payments/initialize:
    $ref: './domains/payments.yaml#/paths/~1payments~1initialize'
  /payments/webhook/paystack:
    $ref: './domains/payments.yaml#/paths/~1payments~1webhook~1paystack'
  /payments/verify/{reference}:
    $ref: './domains/payments.yaml#/paths/~1payments~1verify~1{reference}'

  /uploads/images:
    $ref: './domains/uploads.yaml#/paths/~1uploads~1images'

  /admin/vendors:
    $ref: './domains/admin.yaml#/paths/~1admin~1vendors'
  /admin/vendors/{id}/approve:
    $ref: './domains/admin.yaml#/paths/~1admin~1vendors~1{id}~1approve'
  /admin/orders:
    $ref: './domains/admin.yaml#/paths/~1admin~1orders'
  /admin/products/{id}/inventory:
    $ref: './domains/admin.yaml#/paths/~1admin~1products~1{id}~1inventory'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived access token (15 minutes)

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-indexed)
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page
    ObjectIdParam:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    ProductIdParam:
      name: productId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    ReferenceParam:
      name: reference
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Paystack transaction reference

  schemas:
    ObjectId:
      type: string
      pattern: '^[a-f0-9]{24}$'
      example: '507f1f77bcf86cd799439011'

    UserRole:
      type: string
      enum: [buyer, vendor, admin]

    ProductCategory:
      type: string
      enum: [hoodies, keycaps, desk-pads]

    PaymentStatus:
      type: string
      enum: [pending, paid, failed, refunded]

    OrderStatus:
      type: string
      enum: [pending, processing, shipped, delivered, cancelled]

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          description: Always true for success responses
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        details:
          type: object
          additionalProperties: true

    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          description: Always false for error responses
        message:
          type: string
        error:
          $ref: '#/components/schemas/ErrorDetail'

    User:
      type: object
      required: [id, name, email, role, emailVerified, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserPublic:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthTokens:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min TTL)
        expiresIn:
          type: integer
          description: Access token lifetime in seconds
          example: 900

    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [user, tokens]
              properties:
                user:
                  $ref: '#/components/schemas/UserPublic'
                tokens:
                  $ref: '#/components/schemas/AuthTokens'

    MeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/User'

    Product:
      type: object
      required:
        - id
        - title
        - description
        - price
        - category
        - images
        - inventory
        - vendorId
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        price:
          type: integer
          minimum: 0
          description: Price in minor currency units (kobo)
        category:
          $ref: '#/components/schemas/ProductCategory'
        images:
          type: array
          items:
            type: string
            format: uri
          minItems: 1
          maxItems: 10
        inventory:
          type: integer
          minimum: 0
        vendorId:
          $ref: '#/components/schemas/ObjectId'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required: [title, description, price, category, images, inventory]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        price:
          type: integer
          minimum: 1
        category:
          $ref: '#/components/schemas/ProductCategory'
        images:
          type: array
          items:
            type: string
            format: uri
          minItems: 1
          maxItems: 10
        inventory:
          type: integer
          minimum: 0

    UpdateProductRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        price:
          type: integer
          minimum: 1
        category:
          $ref: '#/components/schemas/ProductCategory'
        images:
          type: array
          items:
            type: string
            format: uri
          minItems: 1
          maxItems: 10
        inventory:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/Product'

    ProductListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, meta]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Product'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    Category:
      type: object
      required: [id, slug, name, productCount, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        slug:
          $ref: '#/components/schemas/ProductCategory'
        name:
          type: string
        description:
          type: string
        productCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCategoryRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          $ref: '#/components/schemas/ProductCategory'
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500

    CategoryResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/Category'

    CategoryListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Category'

    CartItem:
      type: object
      required: [productId, title, price, quantity, image, inventoryAvailable]
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        title:
          type: string
        price:
          type: integer
          description: Unit price in minor units at time of cart read
        quantity:
          type: integer
          minimum: 1
        image:
          type: string
          format: uri
        inventoryAvailable:
          type: integer
          minimum: 0

    Cart:
      type: object
      required: [id, userId, items, subtotal, itemCount, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        userId:
          $ref: '#/components/schemas/ObjectId'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal:
          type: integer
          description: Sum of line totals in minor units
        itemCount:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time

    AddCartItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        quantity:
          type: integer
          minimum: 1
          maximum: 99

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
          maximum: 99

    CartResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/Cart'

    OrderItemSnapshot:
      type: object
      required: [productId, title, priceAtPurchase, quantity, imageSnapshot]
      properties:
        productId:
          $ref: '#/components/schemas/ObjectId'
        title:
          type: string
        priceAtPurchase:
          type: integer
          description: Unit price frozen at checkout in minor units
        quantity:
          type: integer
          minimum: 1
        imageSnapshot:
          type: string
          format: uri

    Order:
      type: object
      required:
        - id
        - userId
        - items
        - totalAmount
        - paymentStatus
        - paymentProvider
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        userId:
          $ref: '#/components/schemas/ObjectId'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemSnapshot'
          minItems: 1
        totalAmount:
          type: integer
          description: Total in minor units frozen at checkout
        paymentStatus:
          $ref: '#/components/schemas/PaymentStatus'
        paymentProvider:
          type: string
          enum: [paystack]
        paymentReference:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/OrderStatus'
        shippingAddress:
          $ref: '#/components/schemas/ShippingAddress'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ShippingAddress:
      type: object
      required: [fullName, line1, city, state, country, postalCode]
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 100
        line1:
          type: string
          minLength: 1
          maxLength: 200
        line2:
          type: string
          maxLength: 200
        city:
          type: string
          minLength: 1
          maxLength: 100
        state:
          type: string
          minLength: 1
          maxLength: 100
        country:
          type: string
          minLength: 2
          maxLength: 2
          description: ISO 3166-1 alpha-2
        postalCode:
          type: string
          minLength: 1
          maxLength: 20

    CheckoutRequest:
      type: object
      required: [shippingAddress]
      properties:
        shippingAddress:
          $ref: '#/components/schemas/ShippingAddress'

    CheckoutResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [order]
              properties:
                order:
                  $ref: '#/components/schemas/Order'

    OrderResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/Order'

    OrderListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, meta]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Order'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'

    PaymentInitializeRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          $ref: '#/components/schemas/ObjectId'
        callbackUrl:
          type: string
          format: uri
          description: Client redirect URL after Paystack checkout

    PaymentSession:
      type: object
      required: [authorizationUrl, reference, accessCode, provider]
      properties:
        authorizationUrl:
          type: string
          format: uri
          description: Paystack hosted checkout URL
        reference:
          type: string
          description: Paystack transaction reference
        accessCode:
          type: string
        provider:
          type: string
          enum: [paystack]

    PaymentInitializeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              $ref: '#/components/schemas/PaymentSession'

    PaymentVerifyResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [reference, paymentStatus, orderId]
              properties:
                reference:
                  type: string
                paymentStatus:
                  $ref: '#/components/schemas/PaymentStatus'
                orderId:
                  $ref: '#/components/schemas/ObjectId'

    UploadImageResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [publicId, secureUrl, width, height, format]
              properties:
                publicId:
                  type: string
                secureUrl:
                  type: string
                  format: uri
                width:
                  type: integer
                height:
                  type: integer
                format:
                  type: string

    VendorApplication:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time

    VendorListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required: [data, meta]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/VendorApplication'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    InventoryOverrideRequest:
      type: object
      required: [inventory]
      properties:
        inventory:
          type: integer
          minimum: 0
        reason:
          type: string
          maxLength: 500

  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Validation failed
            error:
              code: VALIDATION_ERROR
              details:
                fields:
                  - field: email
                    message: Invalid email format
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Authentication required
            error:
              code: UNAUTHORIZED
    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Insufficient permissions
            error:
              code: FORBIDDEN
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Resource not found
            error:
              code: NOT_FOUND
    Conflict:
      description: Resource conflict (e.g., insufficient inventory, duplicate email)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Insufficient inventory for product
            error:
              code: INVENTORY_CONFLICT
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Too many requests
            error:
              code: RATE_LIMIT_EXCEEDED
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            message: Internal server error
            error:
              code: INTERNAL_ERROR
