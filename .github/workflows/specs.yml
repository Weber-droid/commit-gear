name: Specs Validation

on:
  push:
    branches: [main, master]
    paths:
      - 'specs/**'
      - '.github/workflows/specs.yml'
  pull_request:
    paths:
      - 'specs/**'
      - '.github/workflows/specs.yml'

jobs:
  validate-specs:
    name: Validate OpenAPI & Specs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: specs/tooling

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: specs/tooling/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Redocly lint
        run: npm run validate:api

      - name: Bundle OpenAPI
        run: npm run bundle:api

      - name: Spectral lint
        run: npx spectral lint ../api/openapi.bundled.yaml --ruleset ../api/spectral.yaml

      - name: Verify bundled output exists
        run: test -f ../api/openapi.bundled.yaml

      - name: Check domain modules have error response examples
        run: |
          missing=0
          for file in ../api/domains/*.yaml; do
            if ! grep -q "success: false" "$file"; then
              echo "WARN: $file may lack error response examples"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing domain file(s) flagged — review error examples"
          fi
          echo "Domain module check complete"
